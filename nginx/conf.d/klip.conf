# =============================================================================
# Klip server blocks. Included from the http{} context of nginx.conf.
# =============================================================================

# 1. Micro-cache zone for short-link redirects (used by the catch-all location).
proxy_cache_path /var/cache/nginx/redirects keys_zone=redirects:10m
                 max_size=256m inactive=60s use_temp_path=off;

# 2. Service discovery for the app replicas (horizontal scaling).
#    Docker's embedded DNS (127.0.0.11) resolves the compose service name `app`
#    to the live set of container IPs. By proxying to a VARIABLE upstream
#    (set $klip_upstream below) instead of a static `upstream{}` block, nginx
#    re-resolves that name at request time (cached for `valid`), so
#    `docker compose up --scale app=N` is picked up automatically — no reload.
#    valid=5s: at most ~5s to notice a scaled-up/down replica. ipv6=off: the
#    Docker DNS returns A records; skip the AAAA lookup.
#
#    TRADE-OFFS vs a static `upstream{ server app:3000; keepalive 64; }`:
#      - No upstream keepalive pool (a variable proxy_pass can't use one), so each
#        proxied request opens a fresh TCP hop to the app. On the same Docker
#        bridge this is sub-millisecond and acceptable; most redirects are anyway
#        served from the micro-cache below.
#      - No upstream-block `max_fails`/`fail_timeout`. Passive resilience instead
#        comes from Docker DNS dropping dead containers within `valid` + the
#        proxy_next_upstream retry set on the server block. nginx OSS has NO active
#        health checks (that's nginx Plus); use the static-upstream variant + a
#        `nginx -s reload` after scaling if you need keepalive/active checks.
resolver         127.0.0.11 valid=5s ipv6=off;
resolver_timeout 3s;

# Standard proxy headers, reused by every proxying location.
# (Defined as a snippet via map-free include-style block: repeated inline below.)

# 3. HTTP :80 — ACME challenge + redirect everything to HTTPS.
server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  klipo.to;

    # Let's Encrypt HTTP-01 challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# 4. HTTPS :443 — TLS termination + reverse proxy.
server {
    listen       443 ssl default_server;
    listen       [::]:443 ssl default_server;
    http2        on;
    server_name  klipo.to;

    ssl_certificate           /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key       /etc/nginx/certs/privkey.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Variable upstream → forces per-request DNS re-resolution via the resolver
    # above, so scaled replicas are load-balanced automatically (Docker DNS hands
    # back the live container IPs round-robin). Keep host:port in the variable.
    set $klip_upstream app:3000;
    # Passive failover: if a just-killed replica is hit, fail fast and retry the
    # next resolved address rather than surfacing a 502 (nginx OSS has no active
    # health checks). proxy_cache off paths and the redirect path both inherit it.
    proxy_next_upstream       error timeout http_502 http_503 http_504;
    # Try up to 3 resolved replicas and fail FAST off a black-holed one (a
    # container mid-teardown drops the SYN; a short connect timeout lets the retry
    # reach a live replica well within a client's patience).
    proxy_next_upstream_tries   3;
    proxy_next_upstream_timeout 4s;
    proxy_connect_timeout       1s;

    # Compression.
    gzip            on;
    gzip_min_length 256;
    # text/html is always compressed by nginx, so it's omitted here to avoid a
    # "duplicate MIME type" warning.
    gzip_types      text/plain text/css application/json application/javascript;

    # HSTS (2 years, preload-eligible).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # a. API — never cached.
    location /api/ {
        proxy_pass         http://$klip_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache        off;
    }

    # b. Health probe — proxied, not logged.
    location = /healthz {
        access_log off;
        proxy_pass         http://$klip_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # d. Static assets (dashboard build, etc.).
    location /static/ {
        root /usr/share/nginx/html;
    }

    # e. Prometheus metrics — INTERNAL ONLY. Block public access; Prometheus
    # scrapes the app directly on the Docker network (app:3000/metrics).
    location = /metrics {
        allow 127.0.0.1;
        deny all;
    }

    # f. Admin API — INTERNAL ONLY (defense in depth with ADMIN_SECRET). Reach it
    # from the Docker network / an SSH tunnel; add your admin source IP to allow.
    location /admin/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass         http://$klip_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache        off;
    }

    # c. Catch-all → /:code short-link redirects (with micro-cache).
    location / {
        proxy_pass         http://$klip_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Required for webview detection in the app.
        proxy_set_header   User-Agent        $http_user_agent;

        proxy_cache         redirects;
        # Key WITHOUT User-Agent: webview detection lives in the app, and the
        # webview interstitial + analytics 302s are sent `Cache-Control: no-store`
        # (see app/src/routes/redirect.ts), so they are never stored — UA-specific
        # responses can't be cross-served from one cache entry.
        proxy_cache_key     "$scheme$host$request_uri";
        proxy_cache_methods GET HEAD;
        proxy_cache_valid   302 5s;     # short window so link edits propagate fast
        proxy_cache_valid   301 10m;    # analytics-off links cache longer
        proxy_cache_valid   404 30s;    # absorb floods of bad / expired codes
        # nginx's proxy_cache_valid needs explicit codes (no "5xx" shorthand).
        proxy_cache_valid   500 502 503 504 1s;  # brief shield during an upstream blip
        # Never serve/store a cached response for an authenticated request, or for
        # anyone carrying ANY cookie (conservative — keeps per-user paths uncached).
        proxy_cache_bypass  $http_authorization $http_cookie;
        proxy_no_cache      $http_authorization $http_cookie;
        # nginx also honors the upstream's Cache-Control: no-store/no-cache/private
        # by default, so the app's no-store on 302s + interstitials wins regardless
        # of proxy_cache_valid above (those responses are NOT cached).

        # add_header inside a location replaces inherited ones, so re-assert HSTS.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}
