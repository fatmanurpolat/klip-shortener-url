user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /dev/stdout  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;

    gzip  on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Cache for proxied responses (short-link redirects, etc.)
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=klip_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    upstream klip_app {
        server app:3000;
        keepalive 32;
    }

    server {
        listen       80;
        listen       [::]:80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # nginx liveness probe (used by the compose healthcheck)
        location = /healthz {
            access_log off;
            default_type application/json;
            return 200 '{"ok":true,"service":"nginx"}';
        }

        # Application API
        location /api/ {
            proxy_pass         http://klip_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Static frontend first; unknown paths (short slugs) fall through to the app.
        location / {
            try_files $uri $uri/ @app;
        }

        location @app {
            proxy_pass         http://klip_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_cache            klip_cache;
            proxy_cache_valid      200 302 10m;
            proxy_cache_valid      404 1m;
            proxy_cache_use_stale  error timeout updating;
            add_header             X-Cache-Status $upstream_cache_status;
        }
    }

    # ------------------------------------------------------------------
    # TLS termination. Port 443 is published by the nginx compose service.
    # Place certificates in ./nginx/certs (mount it), then enable this block.
    # ------------------------------------------------------------------
    # server {
    #     listen 443 ssl;
    #     listen [::]:443 ssl;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     root  /usr/share/nginx/html;
    #     index index.html;
    #
    #     location = /healthz { access_log off; default_type application/json; return 200 '{"ok":true,"service":"nginx"}'; }
    #     location /api/      { proxy_pass http://klip_app; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    #     location /          { try_files $uri $uri/ @app_ssl; }
    #     location @app_ssl   { proxy_pass http://klip_app; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    # }
}
