name: klip

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Server config — loaded via nginx.conf's `include /etc/nginx/conf.d/*.conf`.
      # This is the PRODUCTION TLS config (klip.conf). For local dev,
      # docker-compose.override.yml shadows this same target with an HTTP-only config.
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certs the :443 block needs in production — provide them on the host:
      # - ./nginx/certs:/etc/nginx/certs:ro
      - ./web:/usr/share/nginx/html:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - klip_net

  app:
    # Horizontally scalable: the app is stateless (Redis-backed cache/counter/
    # rate-limits, stateless JWT sessions), and this service has NO container_name
    # and binds NO host port (`expose`, not `ports`), so multiple replicas can run
    # side by side. nginx load-balances them via Docker DNS (see nginx/conf.d).
    #   Scale:  docker compose up -d --scale app=3
    # Mind Postgres max_connections: total ≈ replicas × PG_POOL_MAX (see deploy.md).
    build:
      context: ./app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      # The app is ALWAYS behind the bundled nginx in this stack, so the real
      # client IP comes from X-Forwarded-For / X-Real-IP. Default to true (still
      # overridable) — without it every client collapses to nginx's IP and shares
      # one rate-limit bucket. Set TRUST_PROXY=false only for direct exposure.
      TRUST_PROXY: ${TRUST_PROXY:-true}
      # Connect to Redis VIA Sentinel (HA): the client follows master failover.
      # Leave REDIS_SENTINELS unset (e.g. local dev) to use REDIS_URL single-node.
      REDIS_SENTINELS: ${REDIS_SENTINELS:-redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379}
      REDIS_MASTER_NAME: ${REDIS_MASTER_NAME:-klip-master}
      # IDs come from a Postgres SEQUENCE, not the Redis counter: durable + HA via
      # Postgres with ZERO async-replication window, so failover can never reissue
      # an id. Sentinel above provides HA for the cache + rate limits. (Set
      # COUNTER_BACKEND=redis to use the Sentinel Redis counter instead — safe in
      # practice but not absolute; see docs/ha-redis-sentinel.md.)
      COUNTER_BACKEND: ${COUNTER_BACKEND:-postgres}
      # Only for COUNTER_BACKEND=snowflake: this node's id (0-1023). MUST be UNIQUE
      # per replica — `--scale app=N` shares this value, so every replica would get
      # the same id and mint DUPLICATES. Assign per-replica (separate service entries
      # or an orchestrator ordinal) before scaling on the snowflake backend.
      MACHINE_ID: ${MACHINE_ID:-0}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - klip_net

  # Mailpit — local SMTP sink for DEV magic-link emails. The app sends to
  # mailpit:1025 over the internal network (no host port for SMTP). The web inbox
  # (8025) is bound to 127.0.0.1 only — it is UNAUTHENTICATED, so never expose it
  # publicly. For production, point the app's SMTP_* at a real relay and drop this.
  mailpit:
    image: axllent/mailpit:v1.30
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - klip_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: klip
      POSTGRES_DB: klip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klip -d klip"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - klip_net

  # --- Redis HA via Sentinel: 1 master + 2 replicas + 3 sentinels --------------
  # The app talks to Sentinel (not a fixed node), so a master failure triggers an
  # automatic failover to a replica with no app reconfiguration. The ID counter
  # additionally fast-forwards past the highest persisted id on every failover
  # (app/src/counter.ts) so a lagging promoted replica can't reissue an ID.
  redis-master:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redismaster:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - klip_net

  redis-replica-1:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--replicaof"
      - "redis-master"
      - "6379"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redisreplica1:/data
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - klip_net

  redis-replica-2:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--replicaof"
      - "redis-master"
      - "6379"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redisreplica2:/data
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - klip_net

  # Three sentinels (quorum 2). Each COPIES the read-only template to a writable
  # path first, because Sentinel rewrites its own config at runtime — a shared RO
  # mount would break that (see redis/sentinel.conf).
  redis-sentinel-1:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_started
      redis-replica-2:
        condition: service_started
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - klip_net

  redis-sentinel-2:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_started
      redis-replica-2:
        condition: service_started
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - klip_net

  redis-sentinel-3:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_started
      redis-replica-2:
        condition: service_started
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - klip_net

volumes:
  pgdata:
  redismaster:
  redisreplica1:
  redisreplica2:
  nginx_cache:

networks:
  klip_net:
    driver: bridge
