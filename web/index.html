<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klip — link shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:   #ffb3d9;
      --rose:   #ff7eb6;
      --purple: #b388ff;
      --violet: #9d7bff;
      --blue:   #8fb8ff;
      --sky:    #bcd8ff;
      --white:  #fffafc;
      --ink:    #5b4a6b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: 'Quicksand', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(1200px 600px at 15% 10%, var(--pink) 0%, transparent 55%),
        radial-gradient(1000px 700px at 85% 20%, var(--purple) 0%, transparent 55%),
        radial-gradient(1100px 800px at 70% 95%, var(--blue) 0%, transparent 55%),
        linear-gradient(135deg, var(--white) 0%, #fdf2fb 45%, #eef3ff 100%);
      overflow: hidden;
      position: relative;
    }

    /* drifting petals */
    .petal {
      position: fixed;
      top: -40px;
      font-size: 1.4rem;
      opacity: 0.7;
      animation: fall linear infinite;
      pointer-events: none;
      user-select: none;
    }
    .petal:nth-child(1) { left: 12%; animation-duration: 11s; animation-delay: 0s; }
    .petal:nth-child(2) { left: 34%; animation-duration: 14s; animation-delay: 2s; }
    .petal:nth-child(3) { left: 58%; animation-duration: 9s;  animation-delay: 1s; }
    .petal:nth-child(4) { left: 76%; animation-duration: 13s; animation-delay: 4s; }
    .petal:nth-child(5) { left: 90%; animation-duration: 10s; animation-delay: 3s; }

    @keyframes fall {
      0%   { transform: translateY(-10vh) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(560px, 100%);
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 28px;
      padding: 3rem 2.6rem;
      text-align: center;
      box-shadow:
        0 20px 60px rgba(157, 123, 255, 0.25),
        0 4px 18px rgba(255, 126, 182, 0.18);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(100deg, var(--rose), var(--violet) 55%, var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo span { font-size: 2.2rem; }

    .tagline {
      margin-top: 0.75rem;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--ink);
      opacity: 0.85;
    }

    .field {
      margin-top: 2rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .field input {
      flex: 1 1 240px;
      padding: 0.95rem 1.1rem;
      font: inherit;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.8);
      border: 1.5px solid rgba(179, 136, 255, 0.4);
      border-radius: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 4px rgba(157, 123, 255, 0.18);
    }
    .field button {
      padding: 0.95rem 1.6rem;
      font: inherit;
      font-weight: 600;
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(100deg, var(--rose), var(--violet));
      box-shadow: 0 8px 22px rgba(157, 123, 255, 0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }
    .field button:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(157, 123, 255, 0.45); }
    .field button:active { transform: translateY(0); }

    .note {
      margin-top: 1.6rem;
      font-size: 0.85rem;
      color: var(--violet);
      font-weight: 500;
    }
    .badge {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.2rem 0.7rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--rose);
      background: rgba(255, 179, 217, 0.3);
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="petal">🌸</div>
  <div class="petal">🌷</div>
  <div class="petal">🌸</div>
  <div class="petal">💮</div>
  <div class="petal">🌷</div>

  <main class="card">
    <div class="logo">🌷 Klip</div>
    <p class="tagline">Shorten links. Escape the webview. Bloom anywhere.</p>

    <form class="field" onsubmit="event.preventDefault();">
      <input type="url" placeholder="Paste a long URL…" aria-label="Long URL" />
      <button type="submit">Klip it</button>
    </form>

    <p class="note">
      Frontend coming soon
      <br />
      <span class="badge">UI placeholder</span>
    </p>
  </main>
</body>
</html>
