# =============================================================================
# Klipo — Redis Sentinel config TEMPLATE.
#
# IMPORTANT: Sentinel REWRITES its own config file at runtime (it records the
# master's address, discovered replicas, and other sentinels). So this file is
# mounted READ-ONLY as a template and each sentinel container COPIES it to a
# writable path before starting:
#     cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf
# Mounting this single file as the live config for all three sentinels would break
# (rewrite fails on a RO bind mount, and three instances would clobber one shared
# file). The copy gives each sentinel its own private, writable config.
# =============================================================================

port 26379

# Use HOSTNAMES, not IPs. Docker hands containers new IPs on restart, so a
# sentinel that cached the master's old IP could never find it again after a
# `docker compose start redis-master`. With resolve-hostnames, Sentinel keeps
# resolving the `redis-master` service name, so the restarted master rejoins as a
# replica correctly. (resolve-hostnames MUST appear before the `monitor` line that
# references the hostname.)
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# Monitor the master by its compose service name. Quorum = 2: at least 2 of the 3
# sentinels must agree the master is down before a failover is authorized.
sentinel monitor klip-master redis-master 6379 2

# Consider the master down after 5s of unresponsiveness.
sentinel down-after-milliseconds klip-master 5000
# Abort/retry a failover that doesn't complete within 60s.
sentinel failover-timeout klip-master 60000
# Reconfigure replicas to the new master one at a time (keeps read capacity up).
sentinel parallel-syncs klip-master 1
